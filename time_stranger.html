<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Time Stranger 进化图</title>
  <style>
    :root {
      color-scheme: light;
      --background: #ffffff;
      --sidebar: #f7f8fa;
      --text: #18202a;
      --muted: #697386;
      --line: #dfe3e8;
      --accent: #2869d8;
      --accent-soft: #eaf1ff;
      --neighbor: #f4f7fc;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      margin: 0;
    }

    body {
      background: var(--background);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
    }

    button,
    input {
      font: inherit;
    }

    button {
      color: inherit;
    }

    button:focus-visible,
    input:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .app {
      position: relative;
      display: grid;
      grid-template-columns: 300px minmax(0, 1fr);
      height: 100%;
      overflow: hidden;
    }

    .app.sidebar-collapsed {
      grid-template-columns: 0 minmax(0, 1fr);
    }

    .sidebar {
      display: flex;
      min-height: 0;
      flex-direction: column;
      background: var(--sidebar);
      border-right: 1px solid var(--line);
      overflow: hidden;
    }

    .app.sidebar-collapsed .sidebar {
      border: 0;
      visibility: hidden;
    }

    .sidebar-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      padding: 22px 20px 16px;
    }

    h1,
    h2,
    p {
      margin: 0;
    }

    h1 {
      font-size: 19px;
      line-height: 1.25;
      letter-spacing: -0.01em;
    }

    .dataset-count {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
    }

    .language-button {
      min-width: 44px;
      padding: 6px 9px;
      background: var(--background);
      border: 1px solid var(--line);
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
    }

    .search-wrap {
      padding: 0 16px 14px;
    }

    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    #search {
      width: 100%;
      height: 38px;
      padding: 0 11px;
      background: var(--background);
      border: 1px solid var(--line);
      border-radius: 6px;
      color: var(--text);
      font-size: 13px;
    }

    #digimon-list {
      min-height: 0;
      overflow-y: auto;
      border-top: 1px solid var(--line);
    }

    .digimon-row {
      display: grid;
      grid-template-columns: 32px 42px minmax(0, 1fr);
      align-items: center;
      width: 100%;
      min-height: 43px;
      padding: 7px 16px;
      background: transparent;
      border: 0;
      border-left: 3px solid transparent;
      border-bottom: 1px solid #e9ecf0;
      cursor: pointer;
      text-align: left;
    }

    .digimon-row:hover {
      background: #f0f2f5;
    }

    .digimon-row.selected {
      background: var(--accent-soft);
      border-left-color: var(--accent);
      color: #164fae;
      font-weight: 600;
    }

    .digimon-number {
      color: var(--muted);
      font-size: 11px;
      font-variant-numeric: tabular-nums;
    }

    .portrait {
      display: block;
      width: 30px;
      height: 30px;
      object-fit: contain;
    }

    .list-portrait {
      width: 26px;
      height: 26px;
    }

    .digimon-row.selected .digimon-number {
      color: #4e6f9f;
    }

    .no-results {
      padding: 24px 16px;
      color: var(--muted);
      text-align: center;
    }

    .workspace {
      display: flex;
      min-width: 0;
      min-height: 0;
      flex-direction: column;
    }

    .graph-header {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      flex: 0 0 auto;
      max-height: min(22vh, 220px);
      padding: 14px 20px 12px;
      border-bottom: 1px solid var(--line);
      overflow-x: hidden;
      overflow-y: auto;
      overscroll-behavior: contain;
      scrollbar-gutter: stable;
    }

    .graph-heading {
      flex: 1;
      min-width: 0;
    }

    .sidebar-toggle {
      position: absolute;
      top: 50%;
      left: 300px;
      z-index: 10;
      display: grid;
      width: 32px;
      height: 48px;
      place-items: center;
      padding: 0;
      background: var(--background);
      border: 1px solid #cbd3dd;
      border-radius: 999px;
      box-shadow: 0 2px 8px rgb(24 32 42 / 14%);
      cursor: pointer;
      transform: translate(-50%, -50%);
      transition: left 160ms ease, top 160ms ease;
    }

    .sidebar-toggle:hover {
      background: var(--accent-soft);
      border-color: #9ab4df;
    }

    .sidebar-toggle-arrow {
      width: 19px;
      height: 19px;
      fill: none;
      stroke: currentColor;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-width: 2;
      transition: transform 160ms ease;
    }

    .app.sidebar-collapsed .sidebar-toggle {
      left: 16px;
    }

    .app.sidebar-collapsed .sidebar-toggle-arrow {
      transform: rotate(180deg);
    }

    .graph-header h2 {
      font-size: 18px;
      line-height: 1.35;
    }

    .selection-meta {
      display: inline-block;
      margin-left: 8px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 400;
      white-space: nowrap;
    }

    .selection-profile {
      margin-top: 6px;
      margin-bottom: 0;
    }

    .selected-section {
      margin-top: 8px;
      padding-top: 7px;
      border-top: 1px solid #edf0f3;
    }

    .profile-meta {
      margin-bottom: 8px;
      font-size: 12px;
      font-weight: 600;
    }

    .requirement-heading {
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
    }

    .requirement-list {
      display: flex;
      flex-wrap: wrap;
      gap: 4px 14px;
      margin: 4px 0 0;
      padding: 0;
      list-style: none;
      font-size: 12px;
      line-height: 1.45;
    }

    .requirement-list li::before {
      content: "•";
      margin-right: 5px;
      color: var(--accent);
    }

    .requirement-note {
      margin-top: 5px;
      color: var(--muted);
      font-size: 11px;
    }

    .detail-heading {
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
    }

    .detail-note {
      margin-top: 4px;
      color: var(--muted);
      font-size: 11px;
    }

    .compatibility-groups {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 4px 14px;
      margin-top: 4px;
    }

    .compatibility-group {
      display: flex;
      align-items: center;
      max-width: 100%;
      gap: 5px;
    }

    .compatibility-label {
      color: var(--muted);
      font-size: 11px;
      font-weight: 600;
      white-space: nowrap;
    }

    .compatibility-row {
      display: flex;
      flex-wrap: wrap;
      gap: 3px;
    }

    .compatibility-chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 5px;
      background: #f7f8fa;
      border: 1px solid #dfe3e8;
      border-radius: 5px;
      font-size: 11px;
      line-height: 1.2;
      white-space: nowrap;
    }

    .compatibility-chip[data-code="1"],
    .compatibility-chip[data-code="2"] {
      background: #fff3f1;
      border-color: #efc6bf;
      color: #9d3225;
    }

    .compatibility-chip[data-code="3"] {
      background: #eef5ff;
      border-color: #c9daf3;
      color: #315f9c;
    }

    .compatibility-chip[data-code="4"] {
      background: #f1f2f4;
      color: #4f5967;
    }

    .effectiveness-symbol {
      min-width: 1em;
      font-weight: 800;
      text-align: center;
    }

    .skill-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(min(260px, 100%), 1fr));
      gap: 8px;
      margin-top: 7px;
    }

    .skill-card {
      min-width: 0;
      padding: 9px 10px;
      background: #f8f9fb;
      border: 1px solid #e1e5ea;
      border-radius: 6px;
    }

    .skill-header {
      display: flex;
      align-items: baseline;
      flex-wrap: wrap;
      gap: 5px;
    }

    .skill-name {
      overflow-wrap: anywhere;
      font-size: 12px;
      font-weight: 700;
    }

    .source-badge {
      padding: 1px 4px;
      background: #eef1f5;
      border-radius: 3px;
      color: var(--muted);
      font-size: 9px;
      font-weight: 600;
    }

    .skill-meta,
    .skill-effect,
    .empty-detail {
      color: var(--muted);
      font-size: 11px;
      line-height: 1.45;
    }

    .skill-meta {
      margin-top: 3px;
    }

    .skill-effect {
      margin-top: 4px;
      overflow-wrap: anywhere;
      color: var(--text);
    }

    .empty-detail {
      margin-top: 6px;
    }

    #graph-scroll {
      min-width: 0;
      min-height: 0;
      flex: 1;
      overflow: auto;
    }

    #graph {
      position: relative;
      width: max-content;
      min-width: 100%;
      min-height: 100%;
      padding: 24px 36px 48px;
    }

    #edge-layer {
      position: absolute;
      top: 0;
      left: 0;
      z-index: 0;
      overflow: visible;
      pointer-events: none;
    }

    #edge-layer path.edge {
      fill: none;
      stroke: #aeb7c4;
      stroke-width: 1.5;
    }

    #edge-layer path.edge.direct {
      stroke: var(--accent);
      stroke-width: 2;
    }

    #graph-columns {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: flex-start;
      gap: 78px;
    }

    .stage-column {
      width: max-content;
      flex: 0 0 auto;
    }

    .stage-title {
      min-height: 29px;
      margin-bottom: 12px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .stage-nodes {
      display: grid;
      grid-auto-flow: column;
      grid-template-rows: repeat(10, minmax(52px, auto));
      grid-auto-columns: 164px;
      gap: 12px;
    }

    .graph-node {
      position: relative;
      display: grid;
      grid-template-columns: 34px minmax(0, 1fr);
      align-items: center;
      width: 164px;
      min-height: 52px;
      padding: 8px 10px;
      background: var(--background);
      border: 1px solid #cfd5dc;
      border-radius: 7px;
      cursor: pointer;
      text-align: left;
    }

    .node-copy {
      min-width: 0;
    }

    .graph-node:hover {
      border-color: #8b98a8;
    }

    .graph-node.direct {
      background: var(--neighbor);
      border-color: #9ab4df;
    }

    .graph-node.selected {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .node-number {
      display: block;
      margin-bottom: 3px;
      color: var(--muted);
      font-size: 10px;
      font-variant-numeric: tabular-nums;
    }

    .graph-node.selected .node-number {
      color: #dbe7ff;
    }

    .node-name {
      display: block;
      overflow-wrap: anywhere;
      font-size: 13px;
      font-weight: 600;
      line-height: 1.25;
    }

    .condition-tooltip {
      position: fixed;
      z-index: 20;
      width: 250px;
      padding: 10px 12px;
      background: #18202a;
      border-radius: 7px;
      box-shadow: 0 6px 24px rgb(24 32 42 / 24%);
      color: #fff;
      font-size: 12px;
      line-height: 1.45;
      pointer-events: none;
    }

    .condition-tooltip[hidden] {
      display: none;
    }

    .condition-tooltip-title,
    .condition-tooltip-line {
      display: block;
    }

    .condition-tooltip-title {
      margin-bottom: 5px;
      color: #aebed3;
      font-size: 11px;
      font-weight: 700;
    }

    .condition-tooltip .profile-meta {
      display: block;
      margin-bottom: 7px;
    }

    .condition-tooltip-line + .condition-tooltip-line {
      margin-top: 3px;
    }

    @media (max-width: 720px) {
      .app {
        grid-template-columns: 1fr;
        grid-template-rows: 300px minmax(0, 1fr);
      }

      .app.sidebar-collapsed {
        grid-template-columns: 1fr;
        grid-template-rows: 0 minmax(0, 1fr);
      }

      .sidebar-toggle {
        top: 300px;
        left: 50%;
        width: 48px;
        height: 32px;
      }

      .sidebar-toggle-arrow {
        transform: rotate(90deg);
      }

      .app.sidebar-collapsed .sidebar-toggle {
        top: 16px;
        left: 50%;
      }

      .app.sidebar-collapsed .sidebar-toggle-arrow {
        transform: rotate(-90deg);
      }

      .sidebar {
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .sidebar-header {
        padding: 14px 16px 10px;
      }

      .search-wrap {
        padding-bottom: 10px;
      }

      .graph-header {
        max-height: 28vh;
        padding: 10px 12px 8px;
      }

      .compatibility-groups {
        gap: 4px 10px;
      }

      .skill-list {
        grid-template-columns: 1fr;
      }

      #graph {
        padding: 20px 120px 40px 24px;
      }

      .stage-nodes {
        grid-template-rows: repeat(6, minmax(52px, auto));
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside id="sidebar" class="sidebar">
      <header class="sidebar-header">
        <div>
          <h1>时空异客</h1>
          <p id="dataset-count" class="dataset-count"></p>
        </div>
        <button id="language" class="language-button" type="button">EN</button>
      </header>
      <div class="search-wrap">
        <label id="search-label" class="visually-hidden" for="search">搜索数码兽</label>
        <input id="search" type="search" autocomplete="off">
      </div>
      <div id="digimon-list"></div>
    </aside>
    <button id="sidebar-toggle" class="sidebar-toggle" type="button" aria-controls="sidebar" aria-expanded="true" aria-label="收起侧边栏">
      <svg class="sidebar-toggle-arrow" viewBox="0 0 24 24" aria-hidden="true">
        <path d="m14.5 6-6 6 6 6"></path>
      </svg>
    </button>
    <main class="workspace">
      <header class="graph-header">
        <div class="graph-heading">
          <h2><span id="selection-title"></span><small id="selection-meta" class="selection-meta"></small></h2>
          <p id="selection-profile" class="profile-meta selection-profile"></p>
          <div id="selected-compatibility" class="selected-section"></div>
          <div id="selected-requirements" class="selected-section"></div>
          <div id="selected-skills" class="selected-section"></div>
        </div>
      </header>
      <div id="graph-scroll">
        <div id="graph">
          <svg id="edge-layer" aria-hidden="true">
            <defs>
              <marker id="arrow" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="6" markerHeight="6" orient="auto">
                <path d="M 0 0 L 8 4 L 0 8 z" fill="#aeb7c4"></path>
              </marker>
              <marker id="arrow-direct" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="6" markerHeight="6" orient="auto">
                <path d="M 0 0 L 8 4 L 0 8 z" fill="#2869d8"></path>
              </marker>
            </defs>
          </svg>
          <div id="graph-columns"></div>
        </div>
      </div>
    </main>
  </div>

    function buildIndexes({ digimon, edges, requirements = [], combat = [], skills = {} }) {
      const byId = new Map(digimon.map(item => [item.id, item]));
      const next = new Map(digimon.map(item => [item.id, []]));
      const previous = new Map(digimon.map(item => [item.id, []]));
      const requirementsById = new Map(requirements.map(item => [item.id, item]));
      const combatById = new Map(combat.map(item => [item.id, item]));
      const skillsById = new Map(Object.entries(skills));

      for (const [from, to] of edges) {
        next.get(from).push(to);
        previous.get(to).push(from);
      }

      return { byId, next, previous, requirementsById, combatById, skillsById };
    }

    function walk(start, adjacency, found) {
      const pending = [...adjacency.get(start)];
      while (pending.length) {
        const id = pending.pop();
        if (found.has(id)) continue;
        found.add(id);
        pending.push(...adjacency.get(id));
      }
    }

    function collectRelated(selectedId, { next, previous }) {
      const ancestors = new Set([selectedId]);
      const descendants = new Set([selectedId]);
      walk(selectedId, previous, ancestors);
      walk(selectedId, next, descendants);
      return new Set([...ancestors, ...descendants]);

        requestAnimationFrame(drawEdges);
      });

      window.addEventListener("resize", () => {
        drawEdges();
      });

      function validateData() {
        const ids = new Set(data.digimon.map(item => item.id));
        const edgeKeys = new Set(data.edges.map(edge => edge.join(":")));
        const requirementIds = new Set(data.requirements.map(item => item.id));
        const combatIds = new Set(data.combat.map(item => item.id));
        if (data.digimon.length !== 475 || ids.size !== 475) throw new Error("Invalid Digimon records");
        if (data.requirements.length !== 475 || requirementIds.size !== 475) throw new Error("Invalid requirement records");
        if (data.combat.length !== 475 || combatIds.size !== 475) throw new Error("Invalid combat records");
        if (edgeKeys.size !== data.edges.length) throw new Error("Duplicate evolution relation");
        for (const [from, to] of data.edges) {
          if (!ids.has(from) || !ids.has(to) || from === to) throw new Error(`Invalid evolution relation: ${from} -> ${to}`);
        }
        for (const requirement of data.requirements) {
          if (!ids.has(requirement.id)) throw new Error(`Invalid requirement target: ${requirement.id}`);
          for (const item of requirement.dna || []) {
            if (!ids.has(item.id)) throw new Error(`Invalid DNA requirement: ${item.id}`);
          }
          for (const id of requirement.modeFrom || []) {
            if (!ids.has(id)) throw new Error(`Invalid Mode Change requirement: ${id}`);
          }
        }
        for (const combat of data.combat) {
          if (!ids.has(combat.id)) throw new Error(`Invalid combat target: ${combat.id}`);
          if (combat.resistances.length !== combatElements.length
            || combat.resistances.some(code => !Number.isInteger(code) || !formatEffectiveness(code))) {
            throw new Error(`Invalid combat compatibility: ${combat.id}`);
          }
          if (!combat.skills.length || combat.skills.some(id => !data.skills[id])) {
            throw new Error(`Invalid special skills: ${combat.id}`);
          }
        }
        for (const [id, skill] of Object.entries(data.skills)) {
          if (!skill.name?.en || !skill.effect?.en) throw new Error(`Invalid special skill: ${id}`);
        }
      }

      function nameOf(digimon) {
        return digimon[state.language];
      }

      function numberOf(id) {
        return String(id).padStart(3, "0");
      }

      function createPortrait(digimon, className = "", eager = false) {
        const image = document.createElement("img");
        image.className = `portrait ${className}`.trim();
        image.src = digimon.image;
        image.alt = "";
        image.loading = eager ? "eager" : "lazy";
        image.decoding = "async";
        image.addEventListener("error", () => { image.hidden = true; });
        return image;
      }

      function requirementLines(id) {
        return formatRequirements(indexes.requirementsById.get(id), state.language, indexes.byId);
      }

      function createCompatibilityChip(label, code) {
        const value = formatEffectiveness(code);
        const chip = document.createElement("span");
        chip.className = "compatibility-chip";
        chip.dataset.code = code;

        const name = document.createElement("span");
        name.textContent = label;
        const symbol = document.createElement("span");
        symbol.className = "effectiveness-symbol";
        symbol.textContent = value.symbol;
        const multiplier = document.createElement("span");
        multiplier.textContent = value.multiplier;
        chip.append(name, symbol, multiplier);
        return chip;
      }

      function createCompatibilityGroup(label, content) {
        const group = document.createElement("div");
        group.className = "compatibility-group";
        const heading = document.createElement("span");
        heading.className = "compatibility-label";
        heading.textContent = label;
        const row = document.createElement("div");
        row.className = "compatibility-row";
        row.append(...content);
        group.append(heading, row);
        return group;
      }

      function renderSelectedCompatibility(id) {
        const text = copy[state.language];
        const combat = indexes.combatById.get(id);
        const groups = document.createElement("div");
        groups.className = "compatibility-groups";

        const matchups = getElementMatchups(combat.resistances);
        if (!matchups.length) {
          const neutral = document.createElement("span");
          neutral.className = "empty-detail";
          neutral.textContent = text.allNeutral;
          elements.compatibility.replaceChildren(neutral);
          return;
        }

        const chipsFor = items => items.map(item => (
          createCompatibilityChip(combatCopy[state.language].elements[item.element], item.code)
        ));
        const weaknesses = matchups.filter(({ code }) => code === 1 || code === 2);
        const resistances = matchups.filter(({ code }) => code === 3 || code === 4);
        if (weaknesses.length) groups.append(createCompatibilityGroup(text.weaknesses, chipsFor(weaknesses)));
        if (resistances.length) groups.append(createCompatibilityGroup(text.resistances, chipsFor(resistances)));
        elements.compatibility.replaceChildren(groups);
      }

      function renderSelectedRequirements(id) {
        const text = copy[state.language];
        const requirement = indexes.requirementsById.get(id);
        const heading = document.createElement("p");
        heading.className = "requirement-heading";
        heading.textContent = text.requirements;
        const list = document.createElement("ul");
        list.className = "requirement-list";
        for (const line of requirementLines(id)) {
          const item = document.createElement("li");
          item.textContent = line;
          list.append(item);
        }
        elements.requirements.replaceChildren(heading, list);
      }

      function renderSelectedSkills(id) {
        const text = copy[state.language];
        const combat = indexes.combatById.get(id);
        const heading = document.createElement("p");
        heading.className = "detail-heading";
        heading.textContent = text.specialSkills;

        if (!combat.skills.length) {
          const empty = document.createElement("p");
          empty.className = "empty-detail";
          empty.textContent = text.noSpecialSkills;
          elements.skills.replaceChildren(heading, empty);
          return;
        }

        const skillRecords = state.language === "zh" && combat.skillsZh?.length
          ? combat.skillsZh
          : combat.skills.map(skillId => indexes.skillsById.get(String(skillId)));
        const list = document.createElement("div");
        list.className = "skill-list";
        for (const skillRecord of skillRecords) {
          const skill = formatSkill(skillRecord, state.language);
          const card = document.createElement("article");
          card.className = "skill-card";
          const header = document.createElement("div");
          header.className = "skill-header";
          const name = document.createElement("h3");
          name.className = "skill-name";
          name.textContent = skill.name;
          header.append(name);
          if (skill.fallback) {
            const badge = document.createElement("span");
            badge.className = "source-badge";
            badge.textContent = text.englishSource;
            header.append(badge);
          }
          const meta = document.createElement("p");
          meta.className = "skill-meta";
          meta.textContent = skill.meta.join(" · ");
          const effect = document.createElement("p");
          effect.className = "skill-effect";
          effect.textContent = skill.effect;
          card.append(header, meta);
          if (skill.effect) card.append(effect);
          list.append(card);
        }
        elements.skills.replaceChildren(heading, list);
      }

      function showConditionTooltip(button, id) {
        conditionTooltip.replaceChildren();
        const profile = document.createElement("span");
        profile.className = "profile-meta";
        profile.textContent = formatProfile(indexes.byId.get(id), state.language);
        const title = document.createElement("span");
        title.className = "condition-tooltip-title";
        title.textContent = copy[state.language].requirements;
        conditionTooltip.append(profile, title);
        for (const line of requirementLines(id)) {
          const item = document.createElement("span");
          item.className = "condition-tooltip-line";
          item.textContent = line;
          conditionTooltip.append(item);
        }
        conditionTooltip.hidden = false;

        const node = button.getBoundingClientRect();
        const tooltip = conditionTooltip.getBoundingClientRect();
        let left = node.right + 10;
        if (left + tooltip.width > window.innerWidth - 12) left = node.left - tooltip.width - 10;
        const top = Math.max(12, Math.min(node.top + node.height / 2 - tooltip.height / 2, window.innerHeight - tooltip.height - 12));
        conditionTooltip.style.left = `${Math.max(12, left)}px`;
        conditionTooltip.style.top = `${top}px`;
      }

      function hideConditionTooltip() {
        conditionTooltip.hidden = true;
      }

      function render() {
        const text = copy[state.language];
        document.documentElement.lang = state.language === "zh" ? "zh-CN" : "en";
        elements.brand.textContent = text.brand;
        elements.count.textContent = text.count;
        elements.search.placeholder = text.search;
        elements.searchLabel.textContent = text.search;
        elements.language.textContent = state.language === "zh" ? "EN" : "中文";
        elements.language.setAttribute("aria-label", text.switchLanguage);
        renderSidebarState();
        renderList();
        renderGraph();
      }

      function updateLanguageUrl() {
        const url = new URL(window.location.href);
        url.searchParams.set("language", state.language);
        window.history.replaceState(null, "", url.href);
      }

      function renderSidebarState() {
        const text = copy[state.language];
        const label = state.sidebarOpen ? text.hideSidebar : text.showSidebar;
        elements.app.classList.toggle("sidebar-collapsed", !state.sidebarOpen);
        elements.sidebar.inert = !state.sidebarOpen;
        elements.sidebarToggle.setAttribute("aria-expanded", String(state.sidebarOpen));
        elements.sidebarToggle.setAttribute("aria-label", label);
        elements.sidebarToggle.title = label;
      }

      function renderList() {
        const visible = data.digimon.filter(item => matchesQuery(item, state.searchQuery));
        elements.list.replaceChildren();

        if (!visible.length) {
          const message = document.createElement("p");
          message.className = "no-results";
          message.textContent = copy[state.language].noResults;
          elements.list.append(message);
          return;
        }

        const fragment = document.createDocumentFragment();
        for (const digimon of visible) {
          const button = document.createElement("button");
          button.type = "button";
          button.className = "digimon-row" + (digimon.id === state.selectedId ? " selected" : "");
          const number = document.createElement("span");
          number.className = "digimon-number";
          number.textContent = numberOf(digimon.id);
          const name = document.createElement("span");
          name.textContent = nameOf(digimon);
          button.append(createPortrait(digimon, "list-portrait"), number, name);
          button.addEventListener("click", () => selectDigimon(digimon.id));
          fragment.append(button);
        }
        elements.list.append(fragment);
      }

      function selectDigimon(id) {
        state.selectedId = id;
        renderList();
        renderGraph();
        const selectedRow = elements.list.querySelector(".selected");
        if (selectedRow) selectedRow.scrollIntoView({ block: "nearest" });
      }

      function renderGraph() {
        hideConditionTooltip();
        const selected = indexes.byId.get(state.selectedId);
        const related = collectRelated(state.selectedId, indexes);
        const direct = new Set([...indexes.previous.get(state.selectedId), ...indexes.next.get(state.selectedId)]);
        const groups = new Map(stageOrder.map(stage => [stage, []]));

        for (const id of related) groups.get(indexes.byId.get(id).stage).push(indexes.byId.get(id));
        for (const group of groups.values()) group.sort((a, b) => a.id - b.id);

        elements.title.textContent = `${numberOf(selected.id)}  ${nameOf(selected)}`;
        elements.meta.textContent = copy[state.language].related(related.size);
        elements.profile.textContent = formatProfile(selected, state.language);
        renderSelectedCompatibility(selected.id);
        renderSelectedRequirements(selected.id);
        renderSelectedSkills(selected.id);
        elements.columns.replaceChildren();

        const fragment = document.createDocumentFragment();
        stageOrder.forEach((stage, stageIndex) => {
          const digimon = groups.get(stage);
          if (!digimon.length) return;

          const column = document.createElement("section");
          column.className = "stage-column";
          const title = document.createElement("h3");
          title.className = "stage-title";
          title.textContent = copy[state.language].stages[stageIndex];
          const nodes = document.createElement("div");
          nodes.className = "stage-nodes";

          for (const item of digimon) {
            const button = document.createElement("button");
            button.type = "button";
            button.dataset.id = item.id;
            button.className = "graph-node";
            button.setAttribute("aria-label", `${numberOf(item.id)} ${nameOf(item)}`);
            button.setAttribute("aria-describedby", conditionTooltip.id);
            if (direct.has(item.id)) button.classList.add("direct");
            if (item.id === state.selectedId) button.classList.add("selected");
            const nodeCopy = document.createElement("span");
            nodeCopy.className = "node-copy";
            nodeCopy.innerHTML = `<span class="node-number">${numberOf(item.id)}</span><span class="node-name">${nameOf(item)}</span>`;
            button.append(createPortrait(item, "", item.id === state.selectedId || direct.has(item.id)), nodeCopy);
            button.addEventListener("mouseenter", () => showConditionTooltip(button, item.id));
            button.addEventListener("mouseleave", hideConditionTooltip);
            button.addEventListener("focus", () => showConditionTooltip(button, item.id));
            button.addEventListener("blur", hideConditionTooltip);
            button.addEventListener("click", () => selectDigimon(item.id));
            nodes.append(button);
          }

          column.append(title, nodes);
          fragment.append(column);
        });

        elements.columns.append(fragment);
        requestAnimationFrame(() => {
          drawEdges();
          centerSelection();
        });
      }

      function drawEdges() {
        const nodes = new Map([...elements.columns.querySelectorAll(".graph-node")].map(node => [Number(node.dataset.id), node]));
        const graphRect = elements.graph.getBoundingClientRect();
        const oldPaths = elements.edges.querySelectorAll("path.edge");
        oldPaths.forEach(path => path.remove());
        elements.edges.setAttribute("width", elements.graph.scrollWidth);
        elements.edges.setAttribute("height", elements.graph.scrollHeight);

        for (const [from, to] of data.edges) {
          const source = nodes.get(from);
          const target = nodes.get(to);
          if (!source || !target) continue;
          const sourceRect = source.getBoundingClientRect();
          const targetRect = target.getBoundingClientRect();
          const sameColumn = Math.abs(sourceRect.left - targetRect.left) < 10;
          let startX, startY, endX, endY, pathData;

          startY = sourceRect.top + sourceRect.height / 2 - graphRect.top;
          endY = targetRect.top + targetRect.height / 2 - graphRect.top;

          if (sameColumn) {
            startX = sourceRect.right - graphRect.left;
            endX = targetRect.right - graphRect.left;
            const bend = Math.max(startX, endX) + 34;
            pathData = `M ${startX} ${startY} C ${bend} ${startY}, ${bend} ${endY}, ${endX} ${endY}`;
          } else if (sourceRect.left < targetRect.left) {
            startX = sourceRect.right - graphRect.left;
            endX = targetRect.left - graphRect.left;
            const middle = (startX + endX) / 2;
            pathData = `M ${startX} ${startY} C ${middle} ${startY}, ${middle} ${endY}, ${endX} ${endY}`;
          } else {
            startX = sourceRect.left - graphRect.left;
            endX = targetRect.right - graphRect.left;
            const middle = (startX + endX) / 2;
            pathData = `M ${startX} ${startY} C ${middle} ${startY}, ${middle} ${endY}, ${endX} ${endY}`;
          }

          const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
          const isDirect = from === state.selectedId || to === state.selectedId;
          path.setAttribute("class", "edge" + (isDirect ? " direct" : ""));
          path.setAttribute("d", pathData);
          path.setAttribute("marker-end", isDirect ? "url(#arrow-direct)" : "url(#arrow)");
          elements.edges.append(path);
        }
      }

      function centerSelection() {
        const selected = elements.columns.querySelector(".graph-node.selected");
        if (!selected) return;
        const selectedRect = selected.getBoundingClientRect();
        const scrollRect = elements.graphScroll.getBoundingClientRect();
        elements.graphScroll.scrollLeft += selectedRect.left - scrollRect.left - elements.graphScroll.clientWidth / 2 + selectedRect.width / 2;
        elements.graphScroll.scrollTop += selectedRect.top - scrollRect.top - elements.graphScroll.clientHeight / 2 + selectedRect.height / 2;
      }
    }
  })();
  </script>
</body>
</html>
