<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Time Stranger 进化图</title>
  <style>
    :root {
      color-scheme: light;
      --background: #ffffff;
      --sidebar: #f7f8fa;
      --text: #18202a;
      --muted: #697386;
      --line: #dfe3e8;
      --accent: #2869d8;
      --accent-soft: #eaf1ff;
      --neighbor: #f4f7fc;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      margin: 0;
    }

    body {
      background: var(--background);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
    }

    button,
    input {
      font: inherit;
    }

    button {
      color: inherit;
    }

    button:focus-visible,
    input:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .app {
      position: relative;
      display: grid;
      grid-template-columns: 300px minmax(0, 1fr);
      height: 100%;
      overflow: hidden;
    }

    .app.sidebar-collapsed {
      grid-template-columns: 0 minmax(0, 1fr);
    }

    .sidebar {
      display: flex;
      min-height: 0;
      flex-direction: column;
      background: var(--sidebar);
      border-right: 1px solid var(--line);
      overflow: hidden;
    }

    .app.sidebar-collapsed .sidebar {
      border: 0;
      visibility: hidden;
    }

    .sidebar-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      padding: 22px 20px 16px;
    }

    h1,
    h2,
    p {
      margin: 0;
    }

    h1 {
      font-size: 19px;
      line-height: 1.25;
      letter-spacing: -0.01em;
    }

    .dataset-count {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
    }

    .language-button {
      min-width: 44px;
      padding: 6px 9px;
      background: var(--background);
      border: 1px solid var(--line);
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
    }

    .search-wrap {
      padding: 0 16px 14px;
    }

    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    #search {
      width: 100%;
      height: 38px;
      padding: 0 11px;
      background: var(--background);
      border: 1px solid var(--line);
      border-radius: 6px;
      color: var(--text);
      font-size: 13px;
    }

    #digimon-list {
      min-height: 0;
      overflow-y: auto;
      border-top: 1px solid var(--line);
    }

    .digimon-row {
      display: grid;
      grid-template-columns: 32px 42px minmax(0, 1fr);
      align-items: center;
      width: 100%;
      min-height: 43px;
      padding: 7px 16px;
      background: transparent;
      border: 0;
      border-left: 3px solid transparent;
      border-bottom: 1px solid #e9ecf0;
      cursor: pointer;
      text-align: left;
    }

    .digimon-row:hover {
      background: #f0f2f5;
    }

    .digimon-row.selected {
      background: var(--accent-soft);
      border-left-color: var(--accent);
      color: #164fae;
      font-weight: 600;
    }

    .digimon-number {
      color: var(--muted);
      font-size: 11px;
      font-variant-numeric: tabular-nums;
    }

    .portrait {
      display: block;
      width: 30px;
      height: 30px;
      object-fit: contain;
    }

    .list-portrait {
      width: 26px;
      height: 26px;
    }

    .digimon-row.selected .digimon-number {
      color: #4e6f9f;
    }

    .no-results {
      padding: 24px 16px;
      color: var(--muted);
      text-align: center;
    }

    .workspace {
      display: flex;
      min-width: 0;
      min-height: 0;
      flex-direction: column;
    }

    .graph-header {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      flex: 0 0 auto;
      padding: 20px 24px 16px;
      border-bottom: 1px solid var(--line);
    }

    .graph-heading {
      flex: 1;
      min-width: 0;
    }

    .sidebar-toggle {
      position: absolute;
      top: 50%;
      left: 300px;
      z-index: 10;
      display: grid;
      width: 32px;
      height: 48px;
      place-items: center;
      padding: 0;
      background: var(--background);
      border: 1px solid #cbd3dd;
      border-radius: 999px;
      box-shadow: 0 2px 8px rgb(24 32 42 / 14%);
      cursor: pointer;
      transform: translate(-50%, -50%);
      transition: left 160ms ease, top 160ms ease;
    }

    .sidebar-toggle:hover {
      background: var(--accent-soft);
      border-color: #9ab4df;
    }

    .sidebar-toggle-arrow {
      width: 19px;
      height: 19px;
      fill: none;
      stroke: currentColor;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-width: 2;
      transition: transform 160ms ease;
    }

    .app.sidebar-collapsed .sidebar-toggle {
      left: 16px;
    }

    .app.sidebar-collapsed .sidebar-toggle-arrow {
      transform: rotate(180deg);
    }

    .graph-header h2 {
      font-size: 18px;
      line-height: 1.35;
    }

    .selection-meta {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
    }

    .selected-requirements {
      margin-top: 10px;
    }

    .profile-meta {
      margin-bottom: 8px;
      font-size: 12px;
      font-weight: 600;
    }

    .requirement-heading {
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
    }

    .requirement-list {
      display: flex;
      flex-wrap: wrap;
      gap: 4px 14px;
      margin: 4px 0 0;
      padding: 0;
      list-style: none;
      font-size: 12px;
      line-height: 1.45;
    }

    .requirement-list li::before {
      content: "•";
      margin-right: 5px;
      color: var(--accent);
    }

    .requirement-note {
      margin-top: 5px;
      color: var(--muted);
      font-size: 11px;
    }

    #graph-scroll {
      min-width: 0;
      min-height: 0;
      flex: 1;
      overflow: auto;
    }

    #graph {
      position: relative;
      width: max-content;
      min-width: 100%;
      min-height: 100%;
      padding: 24px 36px 48px;
    }

    #edge-layer {
      position: absolute;
      top: 0;
      left: 0;
      z-index: 0;
      overflow: visible;
      pointer-events: none;
    }

    #edge-layer path.edge {
      fill: none;
      stroke: #aeb7c4;
      stroke-width: 1.5;
    }

    #edge-layer path.edge.direct {
      stroke: var(--accent);
      stroke-width: 2;
    }

    #graph-columns {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: flex-start;
      gap: 78px;
    }

    .stage-column {
      width: max-content;
      flex: 0 0 auto;
    }

    .stage-title {
      min-height: 29px;
      margin-bottom: 12px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .stage-nodes {
      display: grid;
      grid-auto-flow: column;
      grid-template-rows: repeat(10, minmax(52px, auto));
      grid-auto-columns: 164px;
      gap: 12px;
    }

    .graph-node {
      position: relative;
      display: grid;
      grid-template-columns: 34px minmax(0, 1fr);
      align-items: center;
      width: 164px;
      min-height: 52px;
      padding: 8px 10px;
      background: var(--background);
      border: 1px solid #cfd5dc;
      border-radius: 7px;
      cursor: pointer;
      text-align: left;
    }

    .node-copy {
      min-width: 0;
    }

    .graph-node:hover {
      border-color: #8b98a8;
    }

    .graph-node.direct {
      background: var(--neighbor);
      border-color: #9ab4df;
    }

    .graph-node.selected {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .node-number {
      display: block;
      margin-bottom: 3px;
      color: var(--muted);
      font-size: 10px;
      font-variant-numeric: tabular-nums;
    }

    .graph-node.selected .node-number {
      color: #dbe7ff;
    }

    .node-name {
      display: block;
      overflow-wrap: anywhere;
      font-size: 13px;
      font-weight: 600;
      line-height: 1.25;
    }

    .condition-tooltip {
      position: fixed;
      z-index: 20;
      width: 250px;
      padding: 10px 12px;
      background: #18202a;
      border-radius: 7px;
      box-shadow: 0 6px 24px rgb(24 32 42 / 24%);
      color: #fff;
      font-size: 12px;
      line-height: 1.45;
      pointer-events: none;
    }

    .condition-tooltip[hidden] {
      display: none;
    }

    .condition-tooltip-title,
    .condition-tooltip-line {
      display: block;
    }

    .condition-tooltip-title {
      margin-bottom: 5px;
      color: #aebed3;
      font-size: 11px;
      font-weight: 700;
    }

    .condition-tooltip .profile-meta {
      display: block;
      margin-bottom: 7px;
    }

    .condition-tooltip-line + .condition-tooltip-line {
      margin-top: 3px;
    }

    @media (max-width: 720px) {
      .app {
        grid-template-columns: 1fr;
        grid-template-rows: 300px minmax(0, 1fr);
      }

      .app.sidebar-collapsed {
        grid-template-columns: 1fr;
        grid-template-rows: 0 minmax(0, 1fr);
      }

      .sidebar-toggle {
        top: 300px;
        left: 50%;
        width: 48px;
        height: 32px;
      }

      .sidebar-toggle-arrow {
        transform: rotate(90deg);
      }

      .app.sidebar-collapsed .sidebar-toggle {
        top: 16px;
        left: 50%;
      }

      .app.sidebar-collapsed .sidebar-toggle-arrow {
        transform: rotate(-90deg);
      }

      .sidebar {
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .sidebar-header {
        padding: 14px 16px 10px;
      }

      .search-wrap {
        padding-bottom: 10px;
      }

      .graph-header {
        padding: 14px 16px 12px;
      }

      #graph {
        padding: 20px 120px 40px 24px;
      }

      .stage-nodes {
        grid-template-rows: repeat(6, minmax(52px, auto));
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside id="sidebar" class="sidebar">
      <header class="sidebar-header">
        <div>
          <h1>时空异客</h1>
          <p id="dataset-count" class="dataset-count"></p>
        </div>
        <button id="language" class="language-button" type="button">EN</button>
      </header>
      <div class="search-wrap">
        <label id="search-label" class="visually-hidden" for="search">搜索数码兽</label>
        <input id="search" type="search" autocomplete="off">
      </div>
      <div id="digimon-list"></div>
    </aside>
    <button id="sidebar-toggle" class="sidebar-toggle" type="button" aria-controls="sidebar" aria-expanded="true" aria-label="收起侧边栏">
      <svg class="sidebar-toggle-arrow" viewBox="0 0 24 24" aria-hidden="true">
        <path d="m14.5 6-6 6 6 6"></path>
      </svg>
    </button>
    <main class="workspace">
      <header class="graph-header">
        <div class="graph-heading">
          <h2 id="selection-title"></h2>
          <p id="selection-meta" class="selection-meta"></p>
          <div id="selected-requirements" class="selected-requirements"></div>
        </div>
      </header>
      <div id="graph-scroll">
        <div id="graph">
          <svg id="edge-layer" aria-hidden="true">
            <defs>
              <marker id="arrow" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="6" markerHeight="6" orient="auto">
                <path d="M 0 0 L 8 4 L 0 8 z" fill="#aeb7c4"></path>
              </marker>
              <marker id="arrow-direct" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="6" markerHeight="6" orient="auto">
                <path d="M 0 0 L 8 4 L 0 8 z" fill="#2869d8"></path>
              </marker>
            </defs>
          </svg>
          <div id="graph-columns"></div>
        </div>
      </div>
    </main>
  </div>

  <script id="app">
  (() => {
    "use strict";

    function buildIndexes({ digimon, edges, requirements = [] }) {
      const byId = new Map(digimon.map(item => [item.id, item]));
      const next = new Map(digimon.map(item => [item.id, []]));
      const previous = new Map(digimon.map(item => [item.id, []]));
      const requirementsById = new Map(requirements.map(item => [item.id, item]));

      for (const [from, to] of edges) {
        next.get(from).push(to);
        previous.get(to).push(from);
      }

      return { byId, next, previous, requirementsById };
    }

    function walk(start, adjacency, found) {
      const pending = [...adjacency.get(start)];
      while (pending.length) {
        const id = pending.pop();
        if (found.has(id)) continue;
        found.add(id);
        pending.push(...adjacency.get(id));
      }
    }

    function collectRelated(selectedId, { next, previous }) {
      const ancestors = new Set([selectedId]);
      const descendants = new Set([selectedId]);
      walk(selectedId, previous, ancestors);
      walk(selectedId, next, descendants);
      return new Set([...ancestors, ...descendants]);
    }

    function matchesQuery(digimon, query) {
      const value = query.trim().toLocaleLowerCase();
      if (!value) return true;
      const number = String(digimon.id).padStart(3, "0");
      return number.includes(value)
        || digimon.zh.includes(value)
        || digimon.en.toLocaleLowerCase().includes(value);
    }

    function formatRequirements(requirement, language, byId) {
      const text = requirementCopy[language === "en" ? "en" : "zh"];
      const lines = [];
      const name = id => byId.get(id)?.[language === "en" ? "en" : "zh"] || `#${id}`;

      if (requirement.rank) lines.push(text.rank(requirement.rank));
      for (const key of ["hp", "sp", "atk", "def", "int", "spi", "spd"]) {
        if (requirement.stats?.[key]) lines.push(`${text.stats[key]} ${requirement.stats[key]} ${language === "en" ? "or higher" : "以上"}`);
      }
      if (requirement.talent) lines.push(text.talent(requirement.talent));
      if (requirement.items?.length) lines.push(text.item(requirement.items.map(key => text.items[key] || key).join(language === "en" ? " + " : "＋")));
      if (requirement.dna?.length) {
        const parts = requirement.dna.map(item => `${name(item.id)}${language === "en" ? ` (${text.personalities[item.personality]})` : `（${text.personalities[item.personality]}）`}`);
        lines.push(text.dna(parts.join(language === "en" ? " + " : "＋")));
      }
      for (const key of ["valor", "philanthropy", "amicability", "wisdom"]) {
        if (requirement.agentSkills?.[key]) lines.push(text.agentSkill(text.agentSkills[key], requirement.agentSkills[key]));
      }
      if (requirement.modeFrom?.length) lines.push(text.mode(requirement.modeFrom.map(name).join(language === "en" ? " / " : "／")));
      return lines.length ? lines : [text.none];
    }

      function validateData() {
        const ids = new Set(data.digimon.map(item => item.id));
        const edgeKeys = new Set(data.edges.map(edge => edge.join(":")));
        const requirementIds = new Set(data.requirements.map(item => item.id));
        if (data.digimon.length !== 475 || ids.size !== 475) throw new Error("Invalid Digimon records");
        if (data.requirements.length !== 475 || requirementIds.size !== 475) throw new Error("Invalid requirement records");
        if (edgeKeys.size !== data.edges.length) throw new Error("Duplicate evolution relation");
        for (const [from, to] of data.edges) {
          if (!ids.has(from) || !ids.has(to) || from === to) throw new Error(`Invalid evolution relation: ${from} -> ${to}`);
        }
        for (const requirement of data.requirements) {
          if (!ids.has(requirement.id)) throw new Error(`Invalid requirement target: ${requirement.id}`);
          for (const item of requirement.dna || []) {
            if (!ids.has(item.id)) throw new Error(`Invalid DNA requirement: ${item.id}`);
          }
          for (const id of requirement.modeFrom || []) {
            if (!ids.has(id)) throw new Error(`Invalid Mode Change requirement: ${id}`);
          }
        }
      }

        const groups = new Map(stageOrder.map(stage => [stage, []]));

        for (const id of related) groups.get(indexes.byId.get(id).stage).push(indexes.byId.get(id));
        for (const group of groups.values()) group.sort((a, b) => a.id - b.id);

            button.addEventListener("mouseleave", hideConditionTooltip);
            button.addEventListener("focus", () => showConditionTooltip(button, item.id));
            button.addEventListener("blur", hideConditionTooltip);
            button.addEventListener("click", () => selectDigimon(item.id));
            nodes.append(button);
          }

          column.append(title, nodes);
          fragment.append(column);
        });

        elements.columns.append(fragment);
        requestAnimationFrame(() => {
          drawEdges();
          centerSelection();
        });
      }

      function drawEdges() {
        const nodes = new Map([...elements.columns.querySelectorAll(".graph-node")].map(node => [Number(node.dataset.id), node]));
        const graphRect = elements.graph.getBoundingClientRect();
        const oldPaths = elements.edges.querySelectorAll("path.edge");
        oldPaths.forEach(path => path.remove());
        elements.edges.setAttribute("width", elements.graph.scrollWidth);
        elements.edges.setAttribute("height", elements.graph.scrollHeight);

        for (const [from, to] of data.edges) {
          const source = nodes.get(from);
          const target = nodes.get(to);
          if (!source || !target) continue;
          const sourceRect = source.getBoundingClientRect();
          const targetRect = target.getBoundingClientRect();
          const sameColumn = Math.abs(sourceRect.left - targetRect.left) < 10;
          let startX, startY, endX, endY, pathData;

          startY = sourceRect.top + sourceRect.height / 2 - graphRect.top;
          endY = targetRect.top + targetRect.height / 2 - graphRect.top;

          if (sameColumn) {
            startX = sourceRect.right - graphRect.left;
            endX = targetRect.right - graphRect.left;
            const bend = Math.max(startX, endX) + 34;
            pathData = `M ${startX} ${startY} C ${bend} ${startY}, ${bend} ${endY}, ${endX} ${endY}`;
          } else if (sourceRect.left < targetRect.left) {
            startX = sourceRect.right - graphRect.left;
            endX = targetRect.left - graphRect.left;
            const middle = (startX + endX) / 2;
            pathData = `M ${startX} ${startY} C ${middle} ${startY}, ${middle} ${endY}, ${endX} ${endY}`;
          } else {
            startX = sourceRect.left - graphRect.left;
            endX = targetRect.right - graphRect.left;
            const middle = (startX + endX) / 2;
            pathData = `M ${startX} ${startY} C ${middle} ${startY}, ${middle} ${endY}, ${endX} ${endY}`;
          }

          const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
          const isDirect = from === state.selectedId || to === state.selectedId;
          path.setAttribute("class", "edge" + (isDirect ? " direct" : ""));
          path.setAttribute("d", pathData);
          path.setAttribute("marker-end", isDirect ? "url(#arrow-direct)" : "url(#arrow)");
          elements.edges.append(path);
        }
      }

      function centerSelection() {
        const selected = elements.columns.querySelector(".graph-node.selected");
        if (!selected) return;
        const selectedRect = selected.getBoundingClientRect();
        const scrollRect = elements.graphScroll.getBoundingClientRect();
        elements.graphScroll.scrollLeft += selectedRect.left - scrollRect.left - elements.graphScroll.clientWidth / 2 + selectedRect.width / 2;
        elements.graphScroll.scrollTop += selectedRect.top - scrollRect.top - elements.graphScroll.clientHeight / 2 + selectedRect.height / 2;
      }
    }
  })();
  </script>
</body>
</html>
